name: deploy

# Publish the app to gh-pages on every push. To keep code deploys FAST, the BIST
# data is NOT re-fetched on pushes — the already-published data on gh-pages is
# reused. The (slow) data fetch only runs on a schedule / manual trigger / first
# time. Uses the built-in GITHUB_TOKEN; no Pages API enablement needed.
on:
  push:
    branches: [main, claude/tender-ritchie-kn4ocg]
  schedule:
    - cron: '30 15 * * 1-5' # weekdays after BIST close (15:00 UTC) → refresh data
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30 # safety cap so a hung step can never burn the 6h max
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Reuse already-published BIST data (avoid slow re-fetch)
        run: |
          git clone --depth 1 -b gh-pages "https://github.com/${GITHUB_REPOSITORY}.git" _site 2>/dev/null || true
          mkdir -p public/data
          if [ -d _site/data/bist ]; then cp -r _site/data/bist public/data/; fi
          rm -rf _site

      - name: BIST data (incremental every deploy; full refresh on schedule)
        continue-on-error: true
        env:
          # Incremental on pushes (fetch only newly-added symbols / IPOs, fast);
          # full re-fetch on the scheduled run for fresh prices.
          FORCE_ALL: ${{ github.event_name == 'schedule' && '1' || '' }}
        run: |
          python -m pip install --quiet borsapy numpy pandas
          python scripts/build_bist.py

      - name: Market-wide strategy scan (self-gates; recomputes when stale)
        continue-on-error: true
        env:
          FORCE_ALL: ${{ github.event_name == 'schedule' && '1' || '' }}
        run: python scripts/strategies.py

      - name: Screener snapshot (per-symbol current indicators; refreshes on schedule)
        continue-on-error: true
        env:
          FORCE_ALL: ${{ github.event_name == 'schedule' && '1' || '' }}
        run: python scripts/screener.py

      - run: npm ci
      - run: npm run build

      - name: Publish to gh-pages
        run: |
          touch dist/.nojekyll
          cd dist
          git init -q
          git checkout -q -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -q -m "deploy ${GITHUB_SHA}"
          git push -f "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${GITHUB_REPOSITORY}.git" gh-pages
