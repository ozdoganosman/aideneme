name: deploy

# Build the app and publish it to the `gh-pages` branch on every push, so there
# is always a live URL with the latest version. Uses the built-in GITHUB_TOKEN
# (contents: write) — no Pages API enablement needed.
on:
  push:
    branches: [main, claude/tender-ritchie-kn4ocg]
  schedule:
    - cron: '30 15 * * 1-5' # hafta içi ~BIST kapanışı sonrası (15:00 UTC) veriyi tazele
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build BIST static data (server-side, no CORS)
        continue-on-error: true # veri hatası deploy'u düşürmesin
        run: |
          python -m pip install --quiet borsapy numpy
          python scripts/build_bist.py
      - run: npm ci
      - run: npm run build
      - name: Publish to gh-pages
        run: |
          touch dist/.nojekyll
          cd dist
          git init -q
          git checkout -q -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -q -m "deploy ${GITHUB_SHA}"
          git push -f "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${GITHUB_REPOSITORY}.git" gh-pages
